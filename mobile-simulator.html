<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📱 Zakher Mobile UI Simulator</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1A1A1A;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: white;
        }

        .controls {
            margin-bottom: 20px;
            display: flex;
            gap: 15px;
            align-items: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 15px 25px;
            border-radius: 50px;
            backdrop-filter: blur(10px);
        }

        input[type="text"] {
            padding: 10px 15px;
            border-radius: 20px;
            border: none;
            width: 300px;
            outline: none;
            background: rgba(255, 255, 255, 0.9);
        }

        select {
            padding: 10px;
            border-radius: 20px;
            border: none;
            background: rgba(255, 255, 255, 0.9);
            outline: none;
            cursor: pointer;
        }

        button {
            padding: 10px 20px;
            border-radius: 20px;
            border: none;
            background: #D4AF37;
            color: #1A1A1A;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
        }

        button:hover {
            opacity: 0.9;
        }

        button:active {
            transform: scale(0.95);
        }

        /* The iPhone Hardware Frame */
        .device-frame {
            position: relative;
            background: #ffffff;
            border: 14px solid #333;
            border-radius: 40px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8), inset 0 0 0 2px #555;
            overflow: hidden;
            transition: all 0.5s ease;
        }

        /* Dynamic Island / Notch */
        .device-frame::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 25px;
            background: #333;
            border-bottom-left-radius: 15px;
            border-bottom-right-radius: 15px;
            z-index: 9999;
        }

        /* Home Indicator */
        .device-frame::after {
            content: '';
            position: absolute;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 4px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            z-index: 9999;
            pointer-events: none;
        }

        iframe {
            border: none;
            width: 100%;
            height: 100%;
            background: #F9F9F9;
        }
        
        .header {
            margin-bottom: 20px;
            text-align: center;
        }
        
        .header h1 { margin: 0 0 5px 0; font-size: 24px; font-weight: 300; }
        .header p { margin: 0; font-size: 14px; color: #aaa; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Sovereign Mobile Simulator</h1>
        <p>Test responsive UI breakpoints securely from your desktop</p>
    </div>

    <div class="controls">
        <select id="deviceSelect" onchange="updateDevice()">
            <option value="393x852">iPhone 14 Pro (393 x 852)</option>
            <option value="428x926">iPhone 14 Pro Max (428 x 926)</option>
            <option value="375x667">iPhone SE (375 x 667)</option>
            <option value="412x915">Pixel 7 (412 x 915)</option>
        </select>
        
        <input type="text" id="urlInput" value="http://localhost:3000/en/property/casa-estrella" placeholder="Enter Spoke URL...">
        <button onclick="reloadFrame()">Launch Simulator</button>
    </div>

    <!-- Interactive Phone Container -->
    <div class="device-frame" id="phoneContainer" style="width: 393px; height: 852px;">
        <iframe id="appFrame" src="http://localhost:3000/en/property/casa-estrella" title="Mobile Simulator"></iframe>
    </div>

    <script>
        function updateDevice() {
            const select = document.getElementById('deviceSelect');
            const [width, height] = select.value.split('x');
            const phone = document.getElementById('phoneContainer');
            
            phone.style.width = width + 'px';
            phone.style.height = height + 'px';
        }

        function reloadFrame() {
            const url = document.getElementById('urlInput').value;
            const frame = document.getElementById('appFrame');
            // Adding a timestamp ensures local Next.js cache busts for immediate testing
            const cleanUrl = url.includes('?') ? `${url}&refresh=${Date.now()}` : `${url}?refresh=${Date.now()}`;
            frame.src = cleanUrl;
        }
    </script>

</body>
</html>
